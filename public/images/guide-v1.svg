<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#131314"/>
      <stop offset="100%" style="stop-color:#1c1b1c"/>
    </linearGradient>
    <linearGradient id="morningLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fffde7;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#fffde7;stop-opacity:0"/>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)"/>
  <rect width="800" height="600" fill="url(#morningLight)"/>
  
  <!-- Desk Area -->
  <rect x="0" y="480" width="800" height="120" fill="#0d0d0e" opacity="0.4"/>

  <!-- Journal/Notebook -->
  <g transform="translate(200, 300) rotate(-5)">
    <rect x="0" y="0" width="180" height="240" rx="4" fill="#2a2a2b" stroke="#49454f" stroke-width="0.5"/>
    <path d="M20 40 L160 40 M20 60 L140 60 M20 80 L160 80" stroke="#e5e2e3" stroke-width="1" opacity="0.1"/>
    <rect x="180" y="0" width="180" height="240" rx="4" fill="#2a2a2b" stroke="#49454f" stroke-width="0.5"/>
    <path d="M200 40 L340 40 M200 60 L300 60 M200 80 L340 80" stroke="#e5e2e3" stroke-width="1" opacity="0.1"/>
    <line x1="180" y1="0" x2="180" y2="240" stroke="#131314" stroke-width="2" opacity="0.5"/>
  </g>

  <!-- Tea Cup -->
  <g transform="translate(600, 420)">
    <circle cx="0" cy="0" r="35" fill="#212122" stroke="#49454f" stroke-width="0.5"/>
    <circle cx="0" cy="0" r="28" fill="#131314" opacity="0.8"/>
  </g>

  <!-- Tarot Cards -->
  <g transform="translate(100, 450) rotate(15)">
    <rect width="40" height="65" rx="2" fill="#d0bcff" opacity="0.2" stroke="#d0bcff" stroke-width="0.5"/>
  </g>
  <g transform="translate(140, 460) rotate(-10)">
    <rect width="40" height="65" rx="2" fill="#4cd7f6" opacity="0.15" stroke="#4cd7f6" stroke-width="0.5"/>
  </g>

  <!-- Window Light -->
  <path d="M800 0 L800 300 L400 600 L0 600 L0 500 Z" fill="white" opacity="0.01" filter="url(#softGlow)"/>
</svg>