<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d0e"/>
      <stop offset="100%" style="stop-color:#131314"/>
    </linearGradient>
    <radialGradient id="spiritualGlow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" style="stop-color:#d0bcff;stop-opacity:0.2"/>
      <stop offset="60%" style="stop-color:#4cd7f6;stop-opacity:0.05"/>
      <stop offset="100%" style="stop-color:#131314;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)"/>
  <rect width="800" height="600" fill="url(#spiritualGlow)"/>

  <!-- Light Rays -->
  <g opacity="0.1">
    <line x1="400" y1="300" x2="100" y2="0" stroke="#ffd54f" stroke-width="0.5"/>
    <line x1="400" y1="300" x2="300" y2="0" stroke="#ffd54f" stroke-width="0.5"/>
    <line x1="400" y1="300" x2="500" y2="0" stroke="#ffd54f" stroke-width="0.5"/>
    <line x1="400" y1="300" x2="700" y2="0" stroke="#ffd54f" stroke-width="0.5"/>
  </g>

  <!-- Floating Books / Imagery -->
  <g opacity="0.3">
    <!-- Book 1 -->
    <g transform="translate(150, 200) rotate(-15)">
      <rect width="60" height="80" rx="2" fill="#2a2a2b" stroke="#d0bcff" stroke-width="0.5"/>
      <line x1="10" y1="20" x2="50" y2="20" stroke="#d0bcff" stroke-width="1" opacity="0.2"/>
      <line x1="10" y1="35" x2="40" y2="35" stroke="#d0bcff" stroke-width="1" opacity="0.2"/>
    </g>
    <!-- Book 2 -->
    <g transform="translate(600, 150) rotate(20)">
      <rect width="50" height="70" rx="2" fill="#2a2a2b" stroke="#4cd7f6" stroke-width="0.5"/>
      <line x1="10" y1="15" x2="40" y2="15" stroke="#4cd7f6" stroke-width="1" opacity="0.2"/>
    </g>
    <!-- Tarot Symbol -->
    <circle cx="200" cy="400" r="30" fill="none" stroke="#ffd54f" stroke-width="0.5" opacity="0.4"/>
    <path d="M200 375 L200 425 M175 400 L225 400" stroke="#ffd54f" stroke-width="0.5" opacity="0.4"/>
  </g>

  <!-- Central Figure (Meditating) -->
  <g transform="translate(400, 320)">
    <!-- Aura -->
    <circle r="80" fill="#d0bcff" opacity="0.05" filter="url(#glow)"/>
    
    <!-- Body -->
    <path d="M-40 100 Q-50 40 0 40 Q50 40 40 100 Z" fill="#2a2a2b" opacity="0.8"/>
    <circle cy="0" r="30" fill="#2a2a2b" opacity="0.8"/>
    
    <!-- Golden Accent -->
    <circle cy="0" r="5" fill="#ffd54f" opacity="0.6" filter="url(#glow)"/>
  </g>

  <!-- Floating Particles -->
  <circle cx="300" cy="150" r="1.5" fill="#ffd54f" opacity="0.4"/>
  <circle cx="500" cy="180" r="1" fill="#4cd7f6" opacity="0.4"/>
  <circle cx="450" cy="100" r="2" fill="#d0bcff" opacity="0.4"/>
  <circle cx="350" cy="450" r="1" fill="#98da27" opacity="0.3"/>
</svg>